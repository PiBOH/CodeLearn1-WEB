name: 🐛 Bug Report
description: Something is broken? Help us fix it!
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ### 🛠️ Bug Report
        Thank you for reporting! Please fill out the form below.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-flight Checklist
      options:
        - label: Utilizzo [l'ultima versione](https://github.com/PiBOH/CodeLearn/releases/latest) dell' app.
          required: true
        - label: Ho verificato e non esiste un' altra issue simile
          required: true

  - type: dropdown
    id: component
    attributes:
      label: 📍 Dove credi che sia il bug?
      description: Select the area of the app.
      options:
        - ⚙️ Settings
        - 📥 Downloads
        - 🎨 UI / Visuals
        - 📱 Widgets / Notifiche
        - ❓ Altro
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: 📉 How often does it happen?
      options:
        - 🔴 Sempre (100%)
        - 🟠 Spesso (> 50%)
        - 🟡 A volte (< 50%)
        - 🟢 Raramente (Once or twice)
    validations:
      required: true

  - type: textarea
    id: reproduce-steps
    attributes:
      label: 🔄 Passaggi fatti prima di inciampare nel bug
      description: clear steps lead to a faster fix!
      placeholder: |
        1. Go to ...
        2. Tap on ...
        3. See error
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected-actual
    attributes:
      label: 🆚 Cosa dovrebbe succedere vs. Cosa succede
      description: What happened vs. what should have happened.
      placeholder: |
        Expected: Inizio un corso.
        Actual: L'App crasha immediatamente.
    validations:
      required: true

  - type: markdown
    attributes:
      value: "---"
      
  - type: dropdown
    id: os-type
    attributes:
      label: 💿 Che OS usi?
      options:
        - Windows
        - MacOS
        - iOS (iPhone)
        - Linux (Android)
        - Linux (Debian and derivates)
        - Linux (Arch and derivates)
        - Linux Other
        - Nessuno di questi (specificare)
    validations:
      required: true
      
  - type: dropdown
    id: win-ver
    attributes:
      label: 🪟 Windows Version?
      options:
        - Windows 11
        - Windows 10
        - Windows 8 / 8.1 (Preview)
        - Windows 7 (Preview)
        - Windows Vista (Preview)
        - Windows XP (Preview)
        - Windows LEGACY VERSION
        - I don't use windows
    validations:
      required: false
      
  - type: dropdown
    id: android-version
    attributes:
      label: 🤖 Android Version
      options:
        - Android 17 (Preview)
        - Android 16 (Preview)
        - Android 15
        - Android 14
        - Android 13
        - Android 12
        - Android 11
        - Android 10
        - Android 9 or older
        - Custom ROM (es LineageOS)
    validations:
      required: false

  - type: input
    id: app-version
    attributes:
      label: 📦 App Version
      placeholder: e.g. 1.1.2c-3a (Check Profile -> Info)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 📄 Logs / Screenshots
      description: Paste logs or drag & drop screenshots here.
      render: shell
